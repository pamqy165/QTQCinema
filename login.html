<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - QTQ Cinema</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            max-width: 420px;
            margin: 60px auto;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 32px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 28px;
            border-bottom: 1px solid #333;
        }

        .auth-tabs button {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 16px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .auth-tabs button.active {
            color: #e50914;
            border-bottom-color: #e50914;
            font-weight: bold;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
        🎬 QTQ CINEMA
    </div>
    <div class="nav-links">
        <a href="index.html">← Trang chủ</a>
    </div>
</nav>

<div class="container">
    <div class="auth-container">

        <!-- 2 TAB: ĐĂNG NHẬP / ĐĂNG KÝ -->
        <div class="auth-tabs">
            <button id="tab-login" class="active" onclick="switchTab('login')">Đăng nhập</button>
            <button id="tab-register" onclick="switchTab('register')">Đăng ký</button>
        </div>

        <!-- TAB ĐĂNG NHẬP -->
        <div id="content-login" class="tab-content active">
            <div id="login-error" class="alert alert-error" style="display:none"></div>

            <div class="form-group">
                <label>Tên tài khoản</label>
                <input type="text" id="login-username" placeholder="Nhập tên tài khoản">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="login-password" placeholder="Nhập mật khẩu">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">
                Đăng nhập
            </button>
        </div>

        <!-- TAB ĐĂNG KÝ -->
        <div id="content-register" class="tab-content">
            <div id="register-error" class="alert alert-error" style="display:none"></div>

            <div class="form-group">
                <label>Tên tài khoản</label>
                <input type="text" id="reg-username" placeholder="Nhập tên tài khoản">
            </div>
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="reg-fullname" placeholder="Nhập họ và tên">
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" id="reg-phone" placeholder="Nhập số điện thoại">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="reg-password" placeholder="Nhập mật khẩu">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="handleRegister()">
                Đăng ký
            </button>
        </div>

    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
    // ==================== NẾU ĐÃ LOGIN RỒI THÌ REDIRECT LUÔN ====================
    if (getToken()) {
        window.location.href = 'index.html';
    }

    // ==================== LẤY RETURN URL ====================
    // Nếu bị redirect từ trang khác sang đây, sau khi login xong quay lại trang đó
    function getReturnUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('returnUrl') || 'index.html';
    }

    // ==================== CHUYỂN TAB ====================
    function switchTab(tab) {
        // Ẩn tất cả tab content
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.auth-tabs button').forEach(el => el.classList.remove('active'));

        // Hiện tab được chọn
        document.getElementById('content-' + tab).classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
    }

    // ==================== XỬ LÝ ĐĂNG NHẬP ====================
    async function handleLogin() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const errorEl = document.getElementById('login-error');

        // Kiểm tra nhập đủ thông tin chưa
        if (!username || !password) {
            errorEl.textContent = 'Vui lòng nhập đầy đủ thông tin!';
            errorEl.style.display = 'block';
            return;
        }

        try {
            errorEl.style.display = 'none';
            const data = await login(username, password);

            // Lưu token và thông tin user
            setToken(data.token);
            localStorage.setItem('userInfo', JSON.stringify({
                username: data.username,
                fullName: data.fullName,
                role: data.role
            }));

            // Redirect về trang trước đó
            window.location.href = getReturnUrl();

        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.style.display = 'block';
        }
    }

    // ==================== XỬ LÝ ĐĂNG KÝ ====================
    async function handleRegister() {
        const username = document.getElementById('reg-username').value.trim();
        const fullName = document.getElementById('reg-fullname').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const password = document.getElementById('reg-password').value;
        const errorEl = document.getElementById('register-error');

        // Kiểm tra nhập đủ thông tin chưa
        if (!username || !fullName || !phone || !password) {
            errorEl.textContent = 'Vui lòng nhập đầy đủ thông tin!';
            errorEl.style.display = 'block';
            return;
        }

        try {
            errorEl.style.display = 'none';
            const data = await register(username, fullName, phone, password);

            // Lưu token và thông tin user (auto-login sau đăng ký)
            setToken(data.token);
            localStorage.setItem('userInfo', JSON.stringify({
                username: data.username,
                fullName: data.fullName,
                role: data.role
            }));

            // Redirect về trang trước đó
            window.location.href = getReturnUrl();

        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.style.display = 'block';
        }
    }

    // ==================== NHẤN ENTER ĐỂ ĐĂNG NHẬP ====================
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const activeTab = document.querySelector('.tab-content.active').id;
            if (activeTab === 'content-login') handleLogin();
            else handleRegister();
        }
    });
</script>

</body>
</html>
