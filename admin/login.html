<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - QTQ Cinema</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-login-container {
            max-width: 400px;
            margin: 80px auto;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 40px;
            border-top: 4px solid #e50914;
        }

        .admin-login-title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .admin-login-subtitle {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 32px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">🎬 QTQ CINEMA</div>
    <div class="nav-links">
        <a href="../index.html" style="color:#aaa; font-size:14px">← Về trang chủ</a>
    </div>
</nav>

<div class="container">
    <div class="admin-login-container">

        <!-- TIÊU ĐỀ -->
        <div class="admin-login-title">🔐 Quản trị viên</div>
        <div class="admin-login-subtitle">Đăng nhập để vào trang quản lý</div>

        <!-- THÔNG BÁO LỖI -->
        <div id="login-error" class="alert alert-error" style="display:none"></div>

        <!-- FORM ĐĂNG NHẬP -->
        <div class="form-group">
            <label>Tên tài khoản</label>
            <input type="text" id="username" placeholder="Nhập tên tài khoản admin">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu">
        </div>

        <button 
            class="btn btn-primary" 
            style="width:100%; font-size:16px; padding:12px"
            onclick="handleAdminLogin()"
        >
            Đăng nhập
        </button>

        <!-- GỢI Ý TÀI KHOẢN MẶC ĐỊNH -->
        <div style="
            margin-top: 24px;
            padding: 12px;
            background: #252525;
            border-radius: 6px;
            font-size: 13px;
            color: #aaa;
            text-align: center;
        ">
            Tài khoản mặc định: <strong style="color:white">admin</strong> / 
            <strong style="color:white">admin@123</strong>
        </div>

    </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script>
    // ==================== NẾU ĐÃ LOGIN RỒI THÌ REDIRECT LUÔN ====================
    if (adminGetToken()) {
        window.location.href = 'dashboard.html';
    }

    // ==================== XỬ LÝ ĐĂNG NHẬP ADMIN ====================
    async function handleAdminLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('login-error');

        // Kiểm tra nhập đủ thông tin chưa
        if (!username || !password) {
            errorEl.textContent = 'Vui lòng nhập đầy đủ thông tin!';
            errorEl.style.display = 'block';
            return;
        }

        try {
            errorEl.style.display = 'none';
            const data = await adminLogin(username, password);

            // Lưu token và thông tin admin
            adminSetToken(data.token);
            localStorage.setItem('adminInfo', JSON.stringify({
                username: data.username,
                role: data.role
            }));

            // Redirect vào dashboard
            window.location.href = 'dashboard.html';

        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.style.display = 'block';
        }
    }

    // ==================== NHẤN ENTER ĐỂ ĐĂNG NHẬP ====================
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleAdminLogin();
    });
</script>

</body>
</html>
